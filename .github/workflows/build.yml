# GitHub Actions Workflow is created for testing and preparing the plugin release in the following steps:
# - Validate Gradle Wrapper.
# - Run 'test' and 'verifyPlugin' tasks.
# - Run Qodana inspections.
# - Run the 'buildPlugin' task and prepare artifact for further tests.
# - Run the 'runPluginVerifier' task.
# - Create a draft release.
#
# The workflow is triggered on push, pull_request, workflow_dispatch events.
#
# GitHub Actions reference: https://help.github.com/en/actions

name: Build
on:
  # Trigger the workflow on pushes to only the 'main' branch (this avoids duplicate checks being run e.g., for dependabot pull requests)
  push:
    branches: [ main ]
  # Trigger the workflow on any pull request
  pull_request:
  # Allow manual triggering, e.g. when a rebase causes path filtering to skip all jobs
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true
  
jobs:

  # Detect whether build-relevant files changed
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    outputs:
      build: ${{ steps.filter.outputs.build == 'true' || github.event_name == 'workflow_dispatch' }}
    steps:

      - name: Fetch Sources
        uses: actions/checkout@v6

      - name: Check changed paths
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            build:
              - 'src/**'
              - 'build.gradle.kts'
              - 'settings.gradle.kts'
              - 'gradle/**'
              - 'gradlew'
              - 'gradlew.bat'
              - 'gradle.properties'
              - 'qodana.yml'
              - 'CHANGELOG.md'
              - '.github/workflows/**'

  # Prepare environment and build the plugin
  build:
    name: Build
    needs: [ changes ]
    if: needs.changes.outputs.build == 'true'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.properties.outputs.version }}
      changelog: ${{ steps.properties.outputs.changelog }}
    steps:

      # Check out current repository
      - name: Fetch Sources
        uses: actions/checkout@v6

      # Validate wrapper
      - name: Gradle Wrapper Validation
        uses: gradle/actions/wrapper-validation@v6

      # Set up Java environment for the next steps
      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: 21

      # Setup Gradle
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-provider: basic
          add-job-summary: 'never'

      # Set environment variables
      - name: Export Properties
        id: properties
        shell: bash
        run: |
          PROPERTIES="$(./gradlew properties --console=plain -q)"
          VERSION="$(echo "$PROPERTIES" | grep "^version:" | cut -f2- -d ' ')"
          CHANGELOG="$(./gradlew getChangelog --unreleased --no-header --no-summary --console=plain -q | grep -v '^\[.*\]:')"

          echo "version=$VERSION" >> $GITHUB_OUTPUT

          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      # Build plugin
      - name: Build plugin
        run: ./gradlew buildPlugin

      # Prepare plugin archive content for creating artifact
      - name: Prepare Plugin Artifact
        id: artifact
        shell: bash
        run: |
          cd ${{ github.workspace }}/build/distributions
          FILENAME=`ls *.zip`
          unzip "$FILENAME" -d content

          echo "filename=${FILENAME:0:-4}" >> $GITHUB_OUTPUT

      # Store already-built plugin as an artifact for downloading
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.artifact.outputs.filename }}
          path: ./build/distributions/content/*/*

  # Run tests and upload a code coverage report
  test:
    name: Test
    needs: [ changes, build ]
    if: needs.changes.outputs.build == 'true'
    runs-on: ubuntu-latest
    steps:

      # Check out current repository
      - name: Fetch Sources
        uses: actions/checkout@v6

      # Set up Java environment for the next steps
      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: 21

      # Setup Gradle
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-provider: basic
          add-job-summary: 'never'

      # Run tests
      - name: Run Tests
        run: ./gradlew check

      # Collect Tests Result of failed tests
      - name: Collect Tests Result
        if: ${{ failure() }}
        uses: actions/upload-artifact@v7
        with:
          name: tests-result
          path: ${{ github.workspace }}/build/reports/tests

      # Upload the Kover report to CodeCov
      - name: Upload Code Coverage Report
        uses: codecov/codecov-action@v6
        with:
          files: ${{ github.workspace }}/build/reports/kover/report.xml

  # Run Qodana inspections and provide report
  inspectCode:
    name: Inspect code
    needs: [ changes, build ]
    if: needs.changes.outputs.build == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      checks: write
      pull-requests: write
    steps:

      # Free GitHub Actions Environment Disk Space
      - name: Maximize Build Space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          large-packages: false

      # Check out current repository
      - name: Fetch Sources
        uses: actions/checkout@v6

      # Set up Java environment for the next steps
      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: 21

      # Run Qodana inspections
      - name: Qodana - Code Inspection
        uses: JetBrains/qodana-action@v2026.1.0
        with:
          args: "--image jetbrains/qodana-jvm-community:2026.1"
          cache-default-branch-only: true

  # Compute the verification matrix: one matrix job per (IDE type, release year). Years come from
  # `printProductsReleases` (no IDE downloads), so new years are picked up automatically.
  verifyMatrix:
    name: Resolve verifier IDE matrix
    needs: [ changes ]
    if: needs.changes.outputs.build == 'true'
    runs-on: ubuntu-latest
    outputs:
      include: ${{ steps.gen.outputs.include }}
    steps:

      # Check out current repository
      - name: Fetch Sources
        uses: actions/checkout@v6

      # Set up Java environment for the next steps
      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: 21

      # Setup Gradle
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-provider: basic
          add-job-summary: 'never'

      # Derive the distinct release years and emit a matrix `include` list as JSON.
      #
      # `set -euo pipefail` fails the step if any stage of the pipeline below fails,
      # rather than silently emitting an empty matrix (which would skip verification).
      #
      # printProductsReleases prints one IDE per line in two forms:
      #   RELEASE: GO-2026.1.2  (version form, starts with "20")
      #   EAP:     GO-262.6653.43  (build form; major's first two digits = year - 2000)
      # The case statement maps both forms to a 4-digit year.
      #
      # ideType is the SDK enum passed to Gradle; jq adds ideDisplayName, the human-readable
      # form of ideType shown in the matrix job's name.
      - name: Generate matrix
        id: gen
        shell: bash
        run: |
          set -euo pipefail
          raw=$(./gradlew printProductsReleases -q)
          filtered=$(echo "$raw" | grep -E '^(GO|IU)-' || true)
          echo "Filtered IDE lines:"
          echo "$filtered"
          years=$(echo "$filtered" | while read -r line; do
            v=${line#*-}
            case "$v" in
              20*) echo "${v%%.*}" ;;
              *)   m=${v%%.*}; echo "20${m:0:2}" ;;
            esac
          done | sort -u)
          echo "Resolved years: $years"
          if [ -z "$years" ]; then
            echo "No release years resolved from printProductsReleases" >&2
            echo "Raw output was:" >&2
            echo "$raw" >&2
            exit 1
          fi
          include=$(for y in $years; do for t in GoLand IntellijIdeaUltimate; do
            printf '{"ideType":"%s","year":"%s"}\n' "$t" "$y"; done; done \
            | jq -sc '{ "GoLand": "GoLand", "IntellijIdeaUltimate": "IntelliJ IDEA" } as $names
                      | {include: [ .[] | .ideDisplayName = $names[.ideType] ]}')
          echo "Generated matrix include: $include"
          echo "include=$include" >> "$GITHUB_OUTPUT"

  # Run plugin structure verification along with IntelliJ Plugin Verifier.
  # Matrixed by (IDE type, year) so each matrix job resolves only a few IDEs and keeps its disk
  # footprint lean. Per-job results are merged into a single artifact by the
  # `verifyReport` job below.
  verify:
    name: Verify plugin (${{ matrix.ideDisplayName }} ${{ matrix.year }})
    needs: [ changes, build, verifyMatrix ]
    if: needs.changes.outputs.build == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.verifyMatrix.outputs.include) }}
    steps:

      # Free GitHub Actions Environment Disk Space
      - name: Maximize Build Space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          large-packages: false

      # Check out current repository
      - name: Fetch Sources
        uses: actions/checkout@v6

      # Set up Java environment for the next steps
      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: zulu
          java-version: 21

      # Setup Gradle
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-provider: basic
          add-job-summary: 'never'

      # Run Verify Plugin task and IntelliJ Plugin Verifier tool for this job's IDEs
      - name: Run Plugin Verification tasks
        run: ./gradlew verifyPlugin -PverifyIdeType=${{ matrix.ideType }} -PverifyYear=${{ matrix.year }}

      # Upload this job's Plugin Verifier Result under a unique name (collected later)
      - name: Upload Plugin Verifier Result
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: pluginVerifier-result-${{ matrix.ideType }}-${{ matrix.year }}
          path: ${{ github.workspace }}/build/reports/pluginVerifier

  # Merge the per-job verifier results into a single `pluginVerifier-result` artifact
  # holding every verified IDE's report.
  verifyReport:
    name: Plugin verifier results
    needs: [ changes, verify ]
    if: ${{ always() && needs.changes.outputs.build == 'true' }}
    runs-on: ubuntu-latest
    steps:

      # Check out the repository for the summary script below.
      - name: Fetch Sources
        if: needs.verify.result == 'success' || needs.verify.result == 'failure'
        uses: actions/checkout@v6

      # Pull the per-job reports into the workspace so their verdicts can be compiled
      # into a job summary. Must run before the merge step below, which deletes the
      # per-job artifacts.
      - name: Download Plugin Verifier Results
        if: needs.verify.result == 'success' || needs.verify.result == 'failure'
        uses: actions/download-artifact@v7
        with:
          pattern: pluginVerifier-result-*
          path: pluginVerifier-reports
          merge-multiple: true

      # Compile every verified IDE's verdict and any flagged findings into the job summary.
      - name: Summarize verifier results
        if: needs.verify.result == 'success' || needs.verify.result == 'failure'
        shell: bash
        run: ./.github/scripts/plugin-verifier-summary.sh pluginVerifier-reports >> "$GITHUB_STEP_SUMMARY"

      # Combine the per-job reports and delete the partials. Only runs when the
      # verify matrix actually executed — when it is skipped there are no
      # per-job artifacts and the merge would otherwise error.
      - name: Upload Plugin Verifier Results
        if: needs.verify.result == 'success' || needs.verify.result == 'failure'
        uses: actions/upload-artifact/merge@v7
        with:
          name: pluginVerifier-result
          pattern: pluginVerifier-result-*
          delete-merged: true

      # Fail the job (and the required status check) only if a verify matrix job failed.
      # A skipped verify (e.g. no matrix jobs) is handled by the verifyMatrix job.
      - name: Check verification result
        run: |
          if [ "${{ needs.verify.result }}" = "failure" ]; then
            echo "One or more verify matrix jobs failed (needs.verify.result=${{ needs.verify.result }})" >&2
            exit 1
          fi
          echo "Verify matrix result: ${{ needs.verify.result }}"
          exit 0

  # Prepare a draft release for GitHub Releases page for the manual verification
  # If accepted and published, release workflow would be triggered
  releaseDraft:
    name: Release draft
    if: github.event_name != 'pull_request'
    needs: [ build, test, inspectCode, verify, verifyReport ]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:

      # Check out current repository
      - name: Fetch Sources
        uses: actions/checkout@v6

      # Remove old release drafts by using the curl request for the available releases with a draft flag
      - name: Remove Old Release Drafts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api repos/{owner}/{repo}/releases \
            --jq '.[] | select(.draft == true) | .id' \
            | xargs -I '{}' gh api -X DELETE repos/{owner}/{repo}/releases/{}

      # Create a new release draft which is not publicly visible and requires manual acceptance
      - name: Create Release Draft
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ needs.build.outputs.version }}" \
            --draft \
            --title "v${{ needs.build.outputs.version }}" \
            --notes "$(cat << 'EOM'
          ${{ needs.build.outputs.changelog }}
          EOM
          )"
